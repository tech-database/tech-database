<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <!-- 视图port配置 - 确保响应式在所有设备上正常工作 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- 兼容性 meta 标签 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <!-- 移动端优化 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- 颜色主题 -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <!-- DNS 预解析优化加载 -->
    <link rel="dns-prefetch" href="https://*.supabase.co" />
    <!-- 预连接到关键域名 -->
    <link rel="preconnect" href="https://*.supabase.co" crossorigin />
    <title>办公家具文件管理系统</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- 为不支持 module 的浏览器提供 fallback (可选) -->
    <script nomodule>
      // 如果浏览器不支持 ES Modules，可以显示提示信息
      (function() {
        try {
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML = '<div style="padding: 40px; text-align: center; font-family: system-ui, -apple-system, sans-serif;">' +
              '<h2 style="color: #333;">浏览器版本过低</h2>' +
              '<p style="color: #666; margin-top: 10px;">' +
              '您的浏览器版本过低，可能无法正常使用此系统。' +
              '</p>' +
              '<p style="color: #666; margin-top: 10px;">' +
              '请升级到最新版本的 Chrome、Firefox、Safari 或 Edge 浏览器。' +
              '</p></div>';
          }
        } catch(e) {
          console.log('Browser upgrade suggestion not displayed');
        }
      })();
    </script>
  </body>
</html>
